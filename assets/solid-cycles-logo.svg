<svg xmlns="http://www.w3.org/2000/svg" width="480" height="240" viewBox="0 0 480 240" role="img" aria-labelledby="title desc">
  <title id="title">Solid Cycles Logo</title>
  <desc id="desc">Stylized SC logo for Solid Cycles preview listing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1f1f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eb5e28"/>
      <stop offset="100%" stop-color="#f08a5d"/>
    </linearGradient>
  </defs>
  <rect width="480" height="240" rx="24" fill="url(#bg)"/>
  <rect x="18" y="18" width="444" height="204" rx="18" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <text x="48" y="142" fill="#efefef" font-family="Oswald, Arial, sans-serif" font-size="108" font-weight="700" letter-spacing="4">SC</text>
  <circle cx="370" cy="120" r="36" fill="none" stroke="#eb5e28" stroke-width="8"/>
  <circle cx="370" cy="120" r="10" fill="#eb5e28"/>
  <text x="52" y="190" fill="#d8d8d8" font-family="Arial, sans-serif" font-size="22" letter-spacing="3">SOLID CYCLES PREVIEW</text>
</svg>
